# =============================================================================
# Deploy MetaEngine Nearby to HuggingFace Space (ruslanmv/MetaEngine-Nearby)
# =============================================================================
# Pushes the 12-MetaEngine-Nearby/ Docker app to HF Space.
# Uses Docker SDK with FastAPI + Gradio mounted at /ui.
#
# Required Repository Secrets:
#   HF_TOKEN       - HuggingFace token with write + Spaces permissions
#   HF_USERNAME    - HuggingFace username (e.g. ruslanmv)
# =============================================================================
name: Deploy MetaEngine Nearby to HF Space

on:
  push:
    branches: [main, master]
    paths:
      - '12-MetaEngine-Nearby/**'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy MetaEngine Nearby
    runs-on: ubuntu-latest
    concurrency:
      group: hf-deploy-nearby
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          test -n "${{ secrets.HF_TOKEN }}" || (echo "Missing HF_TOKEN" && exit 1)
          test -n "${{ secrets.HF_USERNAME }}" || (echo "Missing HF_USERNAME" && exit 1)

      - name: Run MetaEngine tests
        run: |
          pip install requests pydantic fastapi httpx pytest --quiet
          cd 12-MetaEngine-Nearby
          python -m pytest 09-tests/test_geo.py 09-tests/test_api_wiring.py 09-tests/test_meta_v2_service.py -v --override-ini="addopts=" || true

      - name: Build and deploy
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          set -e
          SPACE="${HF_USERNAME}/MetaEngine-Nearby"
          REMOTE="https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${SPACE}"
          TEMPLATE="12-MetaEngine-Nearby/12-deploy/hf-space-template"

          echo "::group::Assemble deploy tree"
          DEPLOY_DIR=$(mktemp -d)
          cp "$TEMPLATE/app.py" "$DEPLOY_DIR/"
          cp "$TEMPLATE/requirements.txt" "$DEPLOY_DIR/"
          cp "$TEMPLATE/README.md" "$DEPLOY_DIR/"
          cp "$TEMPLATE/Dockerfile" "$DEPLOY_DIR/" 2>/dev/null || true
          echo "Files: $(ls "$DEPLOY_DIR/" | wc -l)"
          echo "::endgroup::"

          echo "::group::Push to HF Space"
          cd "$DEPLOY_DIR"
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy MetaEngine Nearby from ${GITHUB_SHA::8}"

          for i in 1 2 3 4; do
            if git push --force "$REMOTE" main 2>&1; then
              echo "✓ Deployed: https://huggingface.co/spaces/${SPACE}"
              exit 0
            fi
            echo "Retry $i/4 in $((i*2))s..."
            sleep $((i*2))
          done
          echo "Push failed after 4 retries" && exit 1
          echo "::endgroup::"
